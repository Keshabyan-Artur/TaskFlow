{% extends "base.html" %}
{% block title %}Редактирование задачи{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 600px;">
    <h1>✏️ Редактирование задачи</h1>
    
    <form method="POST">
        <div class="form-group">
            <label for="title">Название задачи *</label>
            <input type="text" id="title" name="title" value="{{ task.title }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="4">{{ task.description or '' }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="deadline">Срок выполнения</label>
            <input type="date" id="deadline" name="deadline" 
                   value="{{ task.deadline.strftime('%Y-%m-%d') if task.deadline else '' }}">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
