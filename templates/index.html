{% extends "base.html" %}
{% block title %}Главная{% endblock %}

{% block content %}
<div class="hero">
    <h1>📋 TaskFlow</h1>
    <p>Простая система управления задачами. Планируйте, выполняйте, анализируйте.</p>
    {% if not current_user.is_authenticated %}
        <div class="hero-buttons">
            <a href="{{ url_for('register') }}" class="btn btn-primary">Начать бесплатно</a>
            <a href="{{ url_for('login') }}" class="btn btn-secondary">Войти</a>
        </div>
    {% else %}
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Перейти к задачам</a>
    {% endif %}
</div>
{% endblock %}
